<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skyline — Weather</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="theme-clear-night">

<div class="ambient" aria-hidden="true">
  <div class="stars"></div>
  <div class="sun"></div>
  <div class="moon"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="rain" id="rain"></div>
  <div class="snow" id="snow"></div>
  <div class="lightning"></div>
</div>

<div class="app">
  <header>
    <div class="brand"><span class="brand-dot"></span> Skyline</div>
    <div class="search">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Search a city…" autocomplete="off" />
      <button class="locate" id="locate" title="Use my location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
      <div class="suggestions" id="sugs"></div>
    </div>
    <div class="unit-toggle" role="tablist">
      <button id="u-c" class="active">°C</button>
      <button id="u-f">°F</button>
    </div>
  </header>

  <div id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="footer">Data from <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></div>
</div>

<script src="script.js"></script>
</body>
</html>
